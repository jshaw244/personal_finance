<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Monthly Cashflow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f0f2f5; color: #222; }

    .topbar { background: #1a1a2e; color: #eee; padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .topbar h1 { margin: 0; font-size: 1.1rem; color: #fff; }
    .topbar a  { color: #aad4f5; font-size: .9rem; text-decoration: none; }
    .topbar a:hover { text-decoration: underline; }

    .month-nav { display: flex; align-items: center; gap: .75rem; margin: 1rem 1.5rem; }
    .month-nav button { padding: .35rem .7rem; background: #0078d7; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; }
    .month-nav button:hover { background: #005fa3; }
    .month-nav strong { font-size: 1.15rem; min-width: 160px; text-align: center; }

    .page { padding: 0 1.5rem 2rem; }

    /* Net summary bar */
    .net-bar { display: flex; gap: 1px; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; font-size: .9rem; }
    .net-bar .seg { flex: 1; padding: .6rem 1rem; text-align: center; }
    .seg-in   { background: #d4edda; color: #155724; }
    .seg-out  { background: #f8d7da; color: #721c24; }
    .seg-net  { background: #cce5ff; color: #004085; }
    .seg-cc   { background: #fff3cd; color: #856404; }
    .seg label { display: block; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; opacity: .75; }
    .seg span  { font-size: 1.1rem; font-weight: 700; }
    .seg-net span.pos { color: #0a7; }
    .seg-net span.neg { color: #c33; }

    .cf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 700px) { .cf-grid { grid-template-columns: 1fr; } }

    .panel { background: #fff; border-radius: 8px; box-shadow: 0 0 4px rgba(0,0,0,.07); overflow: hidden; }
    .panel-hdr { padding: .5rem .85rem; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .hdr-in   { background: #d4edda; color: #155724; }
    .hdr-out  { background: #f8d7da; color: #721c24; }
    .hdr-cc   { background: #fff3cd; color: #856404; }
    .hdr-dep  { background: #e8f4f8; color: #0c5460; }
    .hdr-crd  { background: #f5f0ff; color: #4a235a; }

    /* Account balance cards (now clickable tiles) */
    .bal-row { display: flex; flex-wrap: wrap; gap: .6rem; padding: .75rem .85rem; }
    .bal-card {
      flex: 1 1 160px; min-width: 140px; max-width: 220px;
      border: 1px solid #e0e0e0; border-radius: 6px; padding: .5rem .7rem; background: #fafafa;
    }
    .bal-card.clickable { cursor: pointer; transition: border-color .12s, box-shadow .12s, background .12s; }
    .bal-card.clickable:hover { border-color: #0078d7; box-shadow: 0 1px 5px rgba(0,120,215,.18); }
    .bal-card.active { border: 2px solid #0078d7; background: #eef6ff; }
    .bal-card.all-card { background: #eef3ff; }
    .bal-card.all-card .bc-name { color: #0a52be; }
    .bal-card .bc-inst  { font-size: .68rem; color: #999; text-transform: uppercase; letter-spacing: .03em; }
    .bal-card .bc-name  { font-size: .82rem; font-weight: 600; color: #333; margin: .1rem 0; line-height: 1.2; }
    .bal-card .bc-bal   { font-size: 1.05rem; font-weight: 700; color: #155724; }
    .bal-card .bc-avail { font-size: .75rem; color: #666; margin-top: .15rem; }
    .bal-card .bc-util  { font-size: .72rem; color: #856404; margin-top: .1rem; }
    .bal-updated { padding: .25rem .85rem .5rem; font-size: .72rem; color: #aaa; }

    .cf-section-label { padding: .3rem .85rem; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #666; background: #f8f9fa; border-top: 1px solid #eee; }
    .cf-row { display: flex; justify-content: space-between; align-items: baseline; padding: .28rem .85rem; font-size: .85rem; border-top: 1px solid #f0f0f0; gap: .5rem; }
    .cf-row:hover { background: #fafafa; }
    .cf-date { color: #888; font-size: .78rem; margin-right: .4rem; white-space: nowrap; }
    .cf-amt  { font-weight: 600; white-space: nowrap; }
    .cf-total { display: flex; justify-content: space-between; padding: .4rem .85rem; font-size: .85rem; font-weight: 700; border-top: 2px solid #dee2e6; background: #f8f9fa; }
    .cf-empty { padding: .5rem .85rem; font-size: .82rem; color: #aaa; font-style: italic; }

    .cc-grid { display: grid; grid-template-columns: 1fr 280px; gap: 1rem; }
    @media (max-width: 900px) { .cc-grid { grid-template-columns: 1fr; } }

    table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    thead th { position: sticky; top: 0; background: #f8f9fa; z-index: 1; padding: .45rem .7rem; text-align: left; font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; color: #666; border-bottom: 2px solid #dee2e6; }
    thead th.right { text-align: right; }
    tbody td { padding: .32rem .7rem; border-bottom: 1px solid #f0f0f0; }
    tbody td.right { text-align: right; font-weight: 600; }
    tbody tr:hover { background: #fafafa; }
    tfoot td { padding: .45rem .7rem; font-weight: 700; border-top: 2px solid #dee2e6; background: #f8f9fa; }
    tfoot td.right { text-align: right; }

    .acct-badge { display: inline-block; font-size: .68rem; padding: .05rem .3rem; border-radius: 3px; background: #e9ecef; color: #555; margin-left: .3rem; vertical-align: middle; white-space: nowrap; }

    .cat-list { padding: .5rem 0; }
    .cat-row { display: flex; justify-content: space-between; align-items: center; padding: .28rem .85rem; font-size: .84rem; border-top: 1px solid #f0f0f0; }
    .cat-row:hover { background: #fafafa; }
    .cat-bar-wrap { flex: 1; margin: 0 .75rem; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .cat-bar { height: 100%; background: #f0ad4e; border-radius: 3px; }
    .cat-amt { font-weight: 600; white-space: nowrap; font-size: .84rem; }
    .cat-total { padding: .4rem .85rem; font-size: .85rem; font-weight: 700; border-top: 2px solid #dee2e6; background: #f8f9fa; display: flex; justify-content: space-between; }

    .section-hint { font-size: .72rem; color: #999; padding: 0 .85rem .4rem; }
    #loading { text-align: center; padding: 3rem; color: #888; font-size: 1rem; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>Monthly Cashflow</h1>
  <a href="/reports">← Reports</a>
  <a href="/reports/ai">🤖 Local AI</a>
  <a href="/reports/accounts">Accounts</a>
  <a href="/reports/transactions">Transactions</a>
  <a href="/">← Home</a>
</div>

<div class="month-nav">
  <button onclick="shift(-1)">&#8592; Prev</button>
  <strong id="month-label"></strong>
  <button onclick="shift(1)">Next &#8594;</button>
</div>

<div class="page">
  <!-- Account balance tiles (clickable filters) -->
  <div id="balances-section">
    <div class="panel" style="margin-bottom:1rem;">
      <div class="panel-hdr hdr-dep">Checking &amp; Savings Balances <span style="font-weight:400;text-transform:none;opacity:.7">— click a tile to see its cash flow</span></div>
      <div class="bal-row" id="bal-depository"><span style="color:#aaa;font-size:.85rem;padding:.5rem">Loading…</span></div>
    </div>
    <div class="panel" style="margin-bottom:1rem;">
      <div class="panel-hdr hdr-crd">Credit Card Balances <span style="font-weight:400;text-transform:none;opacity:.7">— click a card to see its activity</span></div>
      <div class="bal-row" id="bal-credit"><span style="color:#aaa;font-size:.85rem;padding:.5rem">Loading…</span></div>
      <div class="bal-updated" id="bal-updated"></div>
    </div>
  </div>

  <div id="loading">Loading…</div>
  <div id="content" style="display:none">

    <!-- Net summary bar (reflects current selections) -->
    <div class="net-bar">
      <div class="seg seg-in"><label id="lbl-in">In</label><span id="t-in">–</span></div>
      <div class="seg seg-out"><label id="lbl-out">Out</label><span id="t-out">–</span></div>
      <div class="seg seg-net"><label id="lbl-net">Net</label><span id="t-net">–</span></div>
      <div class="seg seg-cc"><label id="lbl-cc">CC Spend</label><span id="t-cc">–</span></div>
    </div>

    <!-- Depository detail (driven by the selected checking/savings tile) -->
    <div id="dep-detail"></div>

    <!-- Credit detail (driven by the selected card tile) -->
    <div id="cred-detail"></div>

  </div><!-- #content -->
</div>

<script>
  const fmt  = n => '$' + Math.abs(Number(n)||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtN = n => (n == null ? '–' : fmt(n));
  const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtDate = s => { if(!s) return ''; const [,m,d] = s.split('-'); return `${+m}/${+d}`; };

  let curYear  = new Date().getFullYear();
  let curMonth = new Date().getMonth() + 1;

  // Selection state (independent per group)
  let selDep  = 'all';
  let selCred = 'all';

  let balances    = [];     // /api/account_balances
  let monthlyData = null;   // /api/monthly_cashflow

  function monthStr()  { return `${curYear}-${String(curMonth).padStart(2,'0')}`; }
  function monthLabel(){ return new Date(curYear, curMonth-1, 1).toLocaleString('default', {month:'long', year:'numeric'}); }

  function shift(dir) {
    curMonth += dir;
    if (curMonth > 12) { curMonth = 1;  curYear++; }
    if (curMonth < 1)  { curMonth = 12; curYear--; }
    load();
  }

  // ── Tiles ────────────────────────────────────────────────────────────────
  function balCard(a, group, active) {
    const clickable = !!a.account_id;
    const cls = ['bal-card', clickable ? 'clickable' : '', active ? 'active' : ''].filter(Boolean).join(' ');
    const onclick = clickable ? `onclick="select('${group}','${a.account_id}')"` : '';
    let body;
    if (group === 'cred') {
      const bal = a.current != null ? a.current : 0;
      const lim = a.limit != null ? a.limit : null;
      const util = lim ? `<div class="bc-util">${((bal/lim)*100).toFixed(0)}% utilization</div>` : '';
      const balColor = bal > 0 ? 'color:#721c24' : 'color:#155724';
      body = `<div class="bc-inst">${esc(a.institution)}</div>
        <div class="bc-name">${esc(a.name)}</div>
        <div class="bc-bal" style="${balColor}">${fmt(bal)}</div>${util}`;
    } else {
      const avail = a.available != null ? `<div class="bc-avail">Available: ${fmt(a.available)}</div>` : '';
      body = `<div class="bc-inst">${esc(a.institution)}</div>
        <div class="bc-name">${esc(a.name)}</div>
        <div class="bc-bal">${fmtN(a.current)}</div>${avail}`;
    }
    return `<div class="${cls}" ${onclick}>${body}</div>`;
  }

  function allCard(group, label, total, active) {
    const cls = ['bal-card','all-card','clickable', active ? 'active' : ''].filter(Boolean).join(' ');
    return `<div class="${cls}" onclick="select('${group}','all')">
      <div class="bc-inst">View</div>
      <div class="bc-name">${label}</div>
      <div class="bc-bal" style="color:#0a52be">${fmt(total)}</div>
    </div>`;
  }

  function renderTiles() {
    const dep = balances.filter(a => a.type === 'depository');
    const crd = balances.filter(a => a.type === 'credit');

    const depTotal = dep.reduce((s,a) => s + (a.current||0), 0);
    const crdTotal = crd.reduce((s,a) => s + (a.current||0), 0);

    document.getElementById('bal-depository').innerHTML =
      allCard('dep', 'All (Checking)', depTotal, selDep === 'all') +
      dep.map(a => balCard(a, 'dep', selDep === a.account_id)).join('');

    document.getElementById('bal-credit').innerHTML =
      allCard('cred', 'All Cards', crdTotal, selCred === 'all') +
      crd.map(a => balCard(a, 'cred', selCred === a.account_id)).join('');

    const upd = balances.map(a => a.updated_at).filter(Boolean).sort().reverse();
    if (upd.length) document.getElementById('bal-updated').textContent = 'Balances as of ' + upd[0];
  }

  function select(group, id) {
    if (group === 'dep')  selDep  = id;
    else                  selCred = id;
    renderTiles();
    if (group === 'dep')  renderDep();
    else                  renderCred();
  }

  // ── Cash-flow rendering helpers ──────────────────────────────────────────
  function cfRows(items) {
    if (!items || !items.length) return '<div class="cf-empty">None</div>';
    return items.map(e => `<div class="cf-row">
        <span><span class="cf-date">${fmtDate(e.date)}</span>${esc(e.label)}${e.category ? ` <span class="acct-badge">${esc(e.category)}</span>` : ''}</span>
        <span class="cf-amt">${fmt(e.amount)}</span>
      </div>`).join('');
  }
  function sectionHtml(label, items) {
    return `<div class="cf-section-label">${label}</div>` + cfRows(items);
  }
  function cashflowGrid(title, inItems, inTotal, outItems, outTotal) {
    return `<div class="cf-grid">
      <div class="panel">
        <div class="panel-hdr hdr-in">Money In — ${esc(title)}</div>
        ${typeof inItems === 'string' ? inItems : cfRows(inItems)}
        <div class="cf-total"><span>Total In</span><span>${fmt(inTotal)}</span></div>
      </div>
      <div class="panel">
        <div class="panel-hdr hdr-out">Money Out — ${esc(title)}</div>
        ${typeof outItems === 'string' ? outItems : cfRows(outItems)}
        <div class="cf-total"><span>Total Out</span><span>${fmt(outTotal)}</span></div>
      </div>
    </div>`;
  }

  function setNetBar(label, totals, ccLabel, ccVal) {
    document.getElementById('lbl-in').textContent  = label + ' In';
    document.getElementById('lbl-out').textContent = label + ' Out';
    document.getElementById('lbl-net').textContent = 'Net ' + label;
    document.getElementById('t-in').textContent    = fmt(totals.in);
    document.getElementById('t-out').textContent   = fmt(totals.out);
    document.getElementById('t-net').innerHTML =
      `<span class="${totals.net >= 0 ? 'pos' : 'neg'}">${totals.net >= 0 ? '+' : ''}${fmt(totals.net)}</span>`;
    document.getElementById('lbl-cc').textContent = ccLabel;
    document.getElementById('t-cc').textContent   = fmt(ccVal);
  }

  // ── Depository section ───────────────────────────────────────────────────
  async function renderDep() {
    const el = document.getElementById('dep-detail');
    if (selDep === 'all') {
      const { checking: chk, totals: t } = monthlyData;
      const inHtml  = sectionHtml('Payroll', chk.payroll) + sectionHtml('Other Deposits', chk.income_other);
      const outHtml = sectionHtml('Bills', chk.bills) + sectionHtml('Transfers', chk.transfers) + sectionHtml('Other', chk.misc_out);
      el.innerHTML = cashflowGrid('Checking', inHtml, t.income, outHtml, t.total_out);
      updateNetBarForSelection();
    } else {
      el.innerHTML = '<div class="cf-empty" style="padding:1rem">Loading account…</div>';
      const data = await fetch(`/reports/api/account_cashflow?account_id=${selDep}&month=${monthStr()}`).then(r=>r.json()).catch(()=>null);
      if (!data) { el.innerHTML = '<div class="cf-empty">Could not load account.</div>'; return; }
      el.innerHTML = cashflowGrid(data.account.name, data.money_in, data.totals.in, data.money_out, data.totals.out);
      el._totals = data.totals; el._label = data.account.name;
      updateNetBarForSelection();
    }
  }

  // ── Credit section ───────────────────────────────────────────────────────
  async function renderCred() {
    const el = document.getElementById('cred-detail');
    if (selCred === 'all') {
      el.innerHTML = renderCreditAllHtml(monthlyData);
      updateNetBarForSelection();
    } else {
      el.innerHTML = '<div class="cf-empty" style="padding:1rem">Loading card…</div>';
      const data = await fetch(`/reports/api/account_cashflow?account_id=${selCred}&month=${monthStr()}`).then(r=>r.json()).catch(()=>null);
      if (!data) { el.innerHTML = '<div class="cf-empty">Could not load card.</div>'; return; }
      el.innerHTML = cashflowGrid(data.account.name, data.money_in, data.totals.in, data.money_out, data.totals.out);
      el._totals = data.totals; el._label = data.account.name;
      updateNetBarForSelection();
    }
  }

  function renderCreditAllHtml(data) {
    const cc = data.cc_transactions, cats = data.category_totals, t = data.totals;
    const rows = cc.map(r => `<tr>
        <td>${fmtDate(r.date)}</td>
        <td>${esc(r.merchant)}<span class="acct-badge">${esc(r.account)}</span></td>
        <td>${esc(r.category)}${r.subcategory ? ' · ' + esc(r.subcategory) : ''}</td>
        <td class="right">${fmt(r.amount)}</td>
      </tr>`).join('') || '<tr><td colspan="4" style="color:#aaa;font-style:italic;padding:.5rem .7rem">No charges this month</td></tr>';
    const maxAmt = Math.max(...Object.values(cats), 1);
    const catRows = Object.entries(cats).map(([cat, amt]) => `<div class="cat-row">
        <span style="min-width:120px">${esc(cat)}</span>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${(amt/maxAmt*100).toFixed(1)}%"></div></div>
        <span class="cat-amt">${fmt(amt)}</span>
      </div>`).join('') || '<div class="cf-empty">No data</div>';
    return `<div class="cc-grid">
      <div class="panel">
        <div class="panel-hdr hdr-cc">Credit Card Charges — All Cards</div>
        <div style="overflow-x:auto; max-height:520px; overflow-y:auto;">
          <table>
            <thead><tr><th>Date</th><th>Merchant</th><th>Category</th><th class="right">Amount</th></tr></thead>
            <tbody>${rows}</tbody>
            <tfoot><tr><td colspan="3">Total CC Charges</td><td class="right">${fmt(t.cc_spend)}</td></tr></tfoot>
          </table>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hdr hdr-cc">By Category</div>
        <div class="cat-list">${catRows}</div>
        <div class="cat-total"><span>Total</span><span>${fmt(t.cc_spend)}</span></div>
      </div>
    </div>`;
  }

  // Net bar reflects the depository selection (in/out/net) + credit selection (spend).
  function updateNetBarForSelection() {
    let depLabel, depTotals;
    if (selDep === 'all') {
      depLabel  = 'Checking';
      depTotals = { in: monthlyData.totals.income, out: monthlyData.totals.total_out, net: monthlyData.totals.net };
    } else {
      const el = document.getElementById('dep-detail');
      depLabel  = el._label || 'Account';
      depTotals = el._totals || { in: 0, out: 0, net: 0 };
    }
    let ccLabel, ccVal;
    if (selCred === 'all') {
      ccLabel = 'CC Spend'; ccVal = monthlyData.totals.cc_spend;
    } else {
      const el = document.getElementById('cred-detail');
      ccLabel = 'Card Spend'; ccVal = (el._totals && el._totals.out) || 0;
    }
    setNetBar(depLabel, depTotals, ccLabel, ccVal);
  }

  // ── Main load ────────────────────────────────────────────────────────────
  async function load() {
    document.getElementById('loading').style.display = '';
    document.getElementById('content').style.display = 'none';
    document.getElementById('month-label').textContent = monthLabel();

    const [bal, monthly] = await Promise.all([
      fetch('/reports/api/account_balances').then(r => r.json()).catch(() => []),
      fetch('/reports/api/monthly_cashflow?month=' + monthStr()).then(r => r.json()).catch(() => null),
    ]);
    if (!monthly) { document.getElementById('loading').textContent = 'Error loading data.'; return; }
    balances = bal; monthlyData = monthly;

    renderTiles();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = '';
    await renderDep();
    await renderCred();
  }

  load();
</script>
</body>
</html>
