<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Analysis Reports</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; margin: 2rem; background: #f8f9fa; }
      h1 { color: #1a1a2e; margin-bottom: .25rem; }
      a { color: #0078d7; text-decoration: none; }
      a:hover { text-decoration: underline; }

      #controls { margin-top: 1.5rem; display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
      #controls label { font-weight: 600; }
      select { padding: .4rem .5rem; border: 1px solid #ccc; border-radius: 6px; font-size: .92rem; }
      .small { font-size: .9rem; color: #666; }

      #cards { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.25rem; }
      .card {
        background: #fff; padding: 1rem 1.25rem; border-radius: 8px;
        box-shadow: 0 0 4px rgba(0,0,0,.07);
        flex: 1 1 180px; min-width: 180px;
      }
      .card h3 { margin: 0 0 .25rem; font-size: .9rem; color: #666; text-transform: uppercase; letter-spacing: .04em; }
      .card p { margin: 0; font-size: 1.4rem; font-weight: 700; }
      .card p.positive { color: #0a7; }
      .card p.negative { color: #c33; }

      #charts { margin-top: 2rem; }
      .chart-row { display: grid; gap: 1.25rem; margin-bottom: 1.25rem; }
      .chart-row.cols-2 { grid-template-columns: 1fr 1fr; }
      .chart-row.cols-1 { grid-template-columns: 1fr; }
      @media (max-width: 900px) { .chart-row.cols-2 { grid-template-columns: 1fr; } }

      .chart-card {
        background: #fff; border-radius: 10px;
        box-shadow: 0 1px 6px rgba(0,0,0,.08); padding: .5rem;
        min-height: 360px;
      }
    </style>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  </head>
  <body>
    <h1>Analysis Reports</h1>
    <p>
      <a href="/">← Back to Home</a> &nbsp;|&nbsp;
      <a href="/reports/ai">🤖 Local AI →</a> &nbsp;|&nbsp;
      <a href="/reports/budget">Budget →</a> &nbsp;|&nbsp;
      <a href="/reports/goals">Savings Goals →</a> &nbsp;|&nbsp;
      <a href="/reports/paycalendar">Pay-Period Calendar →</a> &nbsp;|&nbsp;
      <a href="/reports/monthly">Monthly Cashflow →</a> &nbsp;|&nbsp;
      <a href="/reports/transactions">Transactions →</a> &nbsp;|&nbsp;
      <a href="/reports/merchants">Merchants →</a> &nbsp;|&nbsp;
      <a href="/reports/accounts">Accounts →</a> &nbsp;|&nbsp;
      <a href="/reports/holdings">Holdings →</a>
    </p>

    <div id="controls">
      <label for="range">Time Range:</label>
      <select id="range" onchange="onRangeChange()">
        <option value="30d">Last 30 Days</option>
        <option value="ytd" selected>Year-to-Date</option>
        <option value="12m">Last 12 Months</option>
        <option value="custom">Custom…</option>
      </select>
      <label for="account">Account:</label>
      <select id="account" onchange="loadAll()">
        <option value="">All Accounts</option>
      </select>
      <span id="custom-dates" style="display:none; align-items:center; gap:.4rem;">
        <input type="date" id="range-start" style="padding:.35rem .5rem; border:1px solid #ccc; border-radius:6px; font-size:.9rem;">
        <span style="color:#666;">to</span>
        <input type="date" id="range-end"   style="padding:.35rem .5rem; border:1px solid #ccc; border-radius:6px; font-size:.9rem;">
        <button onclick="loadAll()" style="padding:.35rem .7rem; background:#0078d7; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:.9rem;">Apply</button>
      </span>
      <span id="status" class="small"></span>
    </div>

    <div id="cards">
      <div class="card"><h3>Income</h3><p id="card-income">–</p></div>
      <div class="card"><h3>Expenses</h3><p id="card-expenses">–</p></div>
      <div class="card"><h3>Net</h3><p id="card-net">–</p></div>
      <div class="card"><h3>MoM Change</h3><p id="card-mom">–</p></div>
      <div class="card"><h3>Avg Transaction</h3><p id="card-avg">–</p></div>
    </div>

    <div id="charts">
      <!-- Row 1: Monthly Cashflow + Expense/Savings/Investment breakdown -->
      <div class="chart-row cols-2">
        <div class="chart-card" id="chart-cashflow"></div>
        <div class="chart-card" id="chart-cashflow-breakdown"></div>
      </div>
      <!-- Row 2: Category donut + Spending trend -->
      <div class="chart-row cols-2">
        <div class="chart-card" id="chart-category"></div>
        <div class="chart-card" id="chart-trend"></div>
      </div>
      <!-- Row 3: Account balances (full width) -->
      <div class="chart-row cols-1">
        <div class="chart-card" id="chart-accounts"></div>
      </div>
      <!-- Row 4: Top merchants (full width) -->
      <div class="chart-row cols-1">
        <div class="chart-card" id="chart-merchants"></div>
      </div>
    </div>

    <p><a href="/">← Back to Home</a></p>

    <script>
    const REFRESH_MS = 120000;
    const $ = id => document.getElementById(id);

    // Consistent category colour palette (Plotly Safe colorway)
    const CAT_COLORS = [
      '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
      '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf'
    ];

    function money(n) { return '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
    function fmt(n)   { return '$' + Number(n||0).toFixed(2); }

    const plotCfg = { responsive: true, displayModeBar: false };
    const baseLayout = {
      margin: { t: 50, b: 40, l: 60, r: 20 },
      font:   { family: 'system-ui, sans-serif', size: 12 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor:  'rgba(0,0,0,0)',
    };

    function buildRangeQS() {
      const range = $('range').value;
      let qs;
      if (range === 'custom') {
        const s = $('range-start').value, e = $('range-end').value;
        qs = (s && e) ? `start=${s}&end=${e}` : '';
      } else {
        qs = 'range=' + range;
      }
      const acct = $('account').value;
      if (acct && qs) qs += '&account_id=' + encodeURIComponent(acct);
      return qs;
    }

    async function loadAccounts() {
      try {
        const accts = await fetchJSON('/reports/api/transactions/accounts');
        const sel = $('account');
        accts.forEach(a => {
          const o = document.createElement('option');
          o.value = a.account_id; o.textContent = a.label;
          sel.appendChild(o);
        });
      } catch {}
    }

    function onRangeChange() {
      const isCustom = $('range').value === 'custom';
      $('custom-dates').style.display = isCustom ? 'inline-flex' : 'none';
      if (!isCustom) loadAll();
    }

    async function fetchJSON(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    const MONTH_NAMES = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];
    function monthLabel(ym) {
      const mn = parseInt((ym || '').split('-')[1], 10);
      return MONTH_NAMES[mn - 1] || ym;
    }

    // ── Chart 1: Monthly Cashflow (income vs total outflow + net) ───────────
    function drawCashflow(trend) {
      if (!Array.isArray(trend) || !trend.length) return;
      const labels  = trend.map(r => monthLabel(r.month));
      const income  = trend.map(r => r.inflow   || 0);
      const outflow = trend.map(r => r.outflow  || 0);
      const net     = trend.map(r => r.net      || 0);

      Plotly.newPlot('chart-cashflow', [
        { x: labels, y: income,  name: 'Income',  type: 'bar', marker: { color: '#27ae60' } },
        { x: labels, y: outflow, name: 'Outflow', type: 'bar', marker: { color: '#e74c3c' } },
        { x: labels, y: net, name: 'Net',
          type: 'scatter', mode: 'lines+markers',
          line: { color: '#2980b9', width: 2.5 },
          marker: { color: '#2980b9', size: 7 },
        },
      ], {
        ...baseLayout,
        title: { text: 'Monthly Cashflow (Checking)', font: { size: 14 } },
        barmode: 'group',
        legend: { orientation: 'h', y: -0.18 },
        yaxis: { tickprefix: '$', tickformat: ',.0f', gridcolor: '#eee' },
        xaxis: { gridcolor: '#eee' },
      }, plotCfg);
    }

    // ── Chart 1b: Outflow breakdown — Expense / Savings / Investment ─────────
    function drawCashflowBreakdown(trend) {
      if (!Array.isArray(trend) || !trend.length) return;
      const labels     = trend.map(r => monthLabel(r.month));
      const expense    = trend.map(r => r.expense    || 0);
      const savings    = trend.map(r => r.savings    || 0);
      const investment = trend.map(r => r.investment || 0);

      Plotly.newPlot('chart-cashflow-breakdown', [
        { x: labels, y: expense,    name: 'Expense',    type: 'bar', marker: { color: '#e74c3c' } },
        { x: labels, y: savings,    name: 'Savings',    type: 'bar', marker: { color: '#f39c12' } },
        { x: labels, y: investment, name: 'Investment', type: 'bar', marker: { color: '#8e44ad' } },
      ], {
        ...baseLayout,
        title: { text: 'Outflow Breakdown (Checking)', font: { size: 14 } },
        barmode: 'stack',
        legend: { orientation: 'h', y: -0.18 },
        yaxis: { tickprefix: '$', tickformat: ',.0f', gridcolor: '#eee' },
        xaxis: { gridcolor: '#eee' },
      }, plotCfg);
    }

    // ── Chart 2: Spending by Category — donut ───────────────────────────────
    function drawCategory(catData) {
      if (!catData || catData.error) return;
      const entries = Object.entries(catData).sort((a, b) => b[1] - a[1]).slice(0, 12);
      const labels  = entries.map(e => e[0]);
      const values  = entries.map(e => e[1]);
      const total   = values.reduce((s, v) => s + v, 0);

      Plotly.newPlot('chart-category', [{
        values, labels,
        type: 'pie', hole: 0.48,
        textinfo: 'percent',
        textposition: 'inside',
        insidetextorientation: 'radial',
        marker: { colors: CAT_COLORS },
        hovertemplate: '<b>%{label}</b><br>%{value:$,.2f}<br>%{percent}<extra></extra>',
      }], {
        ...baseLayout,
        margin: { t: 50, b: 20, l: 10, r: 10 },
        title: { text: `Spending by Category<br><sub>Total: ${money(total)}</sub>`, font: { size: 14 } },
        legend: { orientation: 'v', x: 1.02, y: 0.5, font: { size: 11 } },
        showlegend: true,
      }, plotCfg);
    }

    // ── Chart 3: Category Spending Trend — line per category ─────────────────
    function drawTrend(data) {
      if (!data || !data.months || !data.months.length) return;
      const traces = data.categories.map((cat, i) => ({
        x: data.months,
        y: data.series[cat] || [],
        name: cat,
        type: 'scatter',
        mode: 'lines+markers',
        line:   { color: CAT_COLORS[i % CAT_COLORS.length], width: 2 },
        marker: { color: CAT_COLORS[i % CAT_COLORS.length], size: 5 },
        hovertemplate: `<b>${cat}</b><br>%{x}: %{y:$,.2f}<extra></extra>`,
      }));

      Plotly.newPlot('chart-trend', traces, {
        ...baseLayout,
        margin: { t: 50, b: 40, l: 65, r: 20 },
        title: { text: 'Spending Trend by Category', font: { size: 14 } },
        legend: { orientation: 'h', y: -0.18 },
        yaxis: { tickprefix: '$', tickformat: ',.0f', gridcolor: '#eee' },
        xaxis: { gridcolor: '#eee' },
      }, plotCfg);
    }

    // ── Chart 4: Account Balances Over Time ──────────────────────────────────
    function drawAccounts(accounts) {
      if (!Array.isArray(accounts) || !accounts.length) return;

      // Colour pools: depository = blues/greens, credit = reds/oranges
      const depColors = ['#2980b9','#27ae60','#16a085','#8e44ad','#2c3e50'];
      const crdColors = ['#e74c3c','#e67e22','#c0392b','#d35400'];
      let di = 0, ci = 0;

      const traces = accounts.map(acct => {
        const isCredit = acct.type === 'credit';
        const color = isCredit ? crdColors[ci++ % crdColors.length] : depColors[di++ % depColors.length];
        return {
          x: acct.dates,
          y: acct.balances,
          name: `${acct.institution} ${acct.name}`,
          type: 'scatter',
          mode: 'lines',
          line: { color, width: 2, dash: isCredit ? 'dot' : 'solid' },
          hovertemplate: `<b>${acct.name}</b><br>%{x}: %{y:$,.2f}<extra></extra>`,
          fill: (!isCredit && accounts.filter(a => a.type !== 'credit').length === 1) ? 'tozeroy' : 'none',
          fillcolor: !isCredit ? color.replace(')', ',0.08)').replace('rgb', 'rgba') : undefined,
        };
      });

      Plotly.newPlot('chart-accounts', traces, {
        ...baseLayout,
        margin: { t: 50, b: 40, l: 75, r: 20 },
        title: { text: 'Account Balances Over Time<br><sub>Solid = depository  ·  Dotted = credit (balance owed)</sub>', font: { size: 14 } },
        legend: { orientation: 'h', y: -0.2, font: { size: 11 } },
        yaxis: { tickprefix: '$', tickformat: ',.0f', gridcolor: '#eee', zeroline: true, zerolinecolor: '#bbb' },
        xaxis: { gridcolor: '#eee' },
      }, plotCfg);
    }

    // ── Chart 5: Top Merchants — horizontal bar coloured by category ─────────
    function drawMerchants(merchants) {
      if (!Array.isArray(merchants) || !merchants.length) return;
      const top  = merchants.slice(0, 20).reverse();  // Plotly h-bar: first = bottom
      const cats = [...new Set(top.map(m => m.category || 'Other'))];
      const palette = Object.fromEntries(cats.map((c, i) => [c, CAT_COLORS[i % CAT_COLORS.length]]));

      const traces = cats.map(cat => {
        const subset = top.filter(m => (m.category || 'Other') === cat);
        return {
          y: subset.map(m => m.merchant),
          x: subset.map(m => m.amount),
          name: cat,
          type: 'bar',
          orientation: 'h',
          marker: { color: palette[cat] },
          text: subset.map(m => `${money(m.amount)}  (${m.count}×)`),
          textposition: 'outside',
          cliponaxis: false,
          hovertemplate: '<b>%{y}</b><br>%{x:$,.2f} · %{text}<extra></extra>',
        };
      });

      Plotly.newPlot('chart-merchants', traces, {
        ...baseLayout,
        margin: { t: 50, b: 40, l: 180, r: 140 },
        title: { text: 'Top Merchants by Spend', font: { size: 14 } },
        barmode: 'stack',
        legend: { orientation: 'v', x: 1.02, y: 1 },
        xaxis: { tickprefix: '$', tickformat: ',.0f', gridcolor: '#eee' },
        yaxis: { gridcolor: '#eee', automargin: true },
        height: Math.max(360, top.length * 28 + 100),
      }, plotCfg);
    }

    // ── KPI cards ────────────────────────────────────────────────────────────
    function updateCards(split, kpi) {
      if (split && !split.error) {
        $('card-income').textContent   = fmt(split.income);
        $('card-expenses').textContent = fmt(split.expenses);
        const net = split.net_balance;
        $('card-net').textContent  = fmt(net);
        $('card-net').className    = net >= 0 ? 'positive' : 'negative';
      }
      if (kpi && !kpi.error) {
        const mom = kpi.mom_pct;
        $('card-mom').textContent = (mom >= 0 ? '+' : '') + mom.toFixed(1) + '%';
        $('card-mom').className   = mom <= 0 ? 'positive' : 'negative';
        $('card-avg').textContent = fmt(kpi.avg_txn);
      }
    }

    // ── Main load ─────────────────────────────────────────────────────────────
    async function loadAll() {
      const qs = buildRangeQS();
      if (!qs) return;
      $('status').textContent = 'Loading…';

      try {
        const [split, kpi, catData, cashflow, merchants, trend, accounts] = await Promise.all([
          fetchJSON('/reports/api/income_expense_split?' + qs),
          fetchJSON('/reports/api/kpi_summary?' + qs),
          fetchJSON('/reports/api/spending_by_category?' + qs),
          fetchJSON('/reports/api/cashflow_summary?' + qs),
          fetchJSON('/reports/api/top_merchants?' + qs),
          fetchJSON('/reports/api/spending_trend?' + qs),
          fetchJSON('/reports/api/account_history?' + qs),
        ]);

        updateCards(split, kpi);
        drawCashflow(Array.isArray(cashflow) ? cashflow : []);
        drawCashflowBreakdown(Array.isArray(cashflow) ? cashflow : []);
        drawCategory(catData);
        drawTrend(trend);
        drawAccounts(accounts);
        drawMerchants(merchants);

        $('status').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (err) {
        console.error(err);
        $('status').textContent = 'Error loading data';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date();
      const mm   = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      $('range-start').value = `${yyyy}-${mm}-01`;
      $('range-end').value   = today.toISOString().slice(0, 10);

      loadAccounts();
      loadAll();
      $('range').addEventListener('change', onRangeChange);
      setInterval(loadAll, REFRESH_MS);

      setInterval(async () => {
        const resp = await fetch('/reports/api/ping');
        if (resp.status === 401)
          window.location.href = '/reports/login?next=' + encodeURIComponent(window.location.pathname);
      }, 60000);
    });
    </script>
  </body>
</html>
